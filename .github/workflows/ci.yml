name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# 同一 PR/push 的并发任务自动取消旧的，节省资源
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check & build
        # 使用 build（tsc -b && vite build）作为真正的质量门禁
        # 单独 tsc --noEmit 会漏掉项目引用模式下的错误
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test
